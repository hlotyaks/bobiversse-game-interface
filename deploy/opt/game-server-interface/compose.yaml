services:
  interface:
    build:
      context: .
      dockerfile: Dockerfile
    image: bobiverse-game-server-interface:phase3
    user: "995:983"
    init: true
    read_only: true
    restart: "no"
    environment:
      CONTROLLER_SOCKET: /run/game-server-interface/controller.sock
      INTERFACE_SOCKET: /run/game-server-interface/web/interface.sock
      # Phase 5 sets this from a root-owned systemd environment file.
      TRUSTED_ACTOR_HEADER: "${TRUSTED_ACTOR_HEADER:-0}"
      # Root-owned, comma-separated Tailscale login allowlist for game-request exports.
      GAME_INTERFACE_ADMIN_LOGINS: "${GAME_INTERFACE_ADMIN_LOGINS:-}"
    volumes:
      - type: bind
        source: /run/game-server-interface/controller.sock
        target: /run/game-server-interface/controller.sock
        read_only: true
      - type: bind
        source: /run/game-server-interface/web
        target: /run/game-server-interface/web
        read_only: false
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.50
    networks:
      - interface

networks:
  interface:
    driver: bridge
